spring:
  application:
    name: yscord
  datasource:
    # No defaults on purpose: a missing env var must fail fast, never silently
    # connect with a weak baked-in credential. Local dev values live in the `dev`
    # profile (application-dev.yml); Docker/prod supply these via the environment.
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

# Schema is owned by the Exposed MigrationRunner (see de.yscord.player.db), applied
# on startup. Run with `--db.rollback=N` to revert the last N migrations.

player:
  # Path to the yt-dlp binary (defaults to whatever is on PATH).
  yt-dlp-path: ${PLAYER_YTDLP_PATH:yt-dlp}
  # Where downloaded audio is cached (defaults to a temp subdir).
  cache-dir: ${PLAYER_CACHE_DIR:${java.io.tmpdir}/yscord-audio}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
