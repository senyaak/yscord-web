spring:
  datasource:
    # H2 in PostgreSQL-compatibility mode; the Exposed MigrationRunner creates the
    # schema on startup via dialect-aware SchemaUtils, so no Hibernate needed.
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
